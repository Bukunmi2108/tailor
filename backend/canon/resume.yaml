    First Class law graduate turned AI engineer - I understand legal workflows and I ship the systems that fix them.
    Most recently at Qanooni AI (Dubai-based, remote), building enterprise legal AI: document-processing pipelines and
    QCounsel, a 26-tool AI agent running inside Microsoft Word. I build production AI systems and the evaluation pipelines
