projects:
  - id: proj.capit
    name: Capit – Glass-box image captioner
    links:
      - {id: proj.capit.demo, label: Live demo, url: "https://capit-one.vercel.app/"}
      - {id: proj.capit.github, label: GitHub, url: "https://github.com/Bukunmi2108/capit"}
      - {id: proj.capit.model, label: Model (HF), url: "https://huggingface.co/Bukunmi2108/capit-sat"}
    text: "Show, Attend and Tell trained from scratch (frozen ResNet-50 encoder, Bahdanau attention + LSTM decoder, Flickr8k): BLEU-4 23.63 / CIDEr 62.80 (beam 5, Karpathy split). UI exposes per-word attention heatmaps and the beam candidates it rejected, with BLIP alongside as a closed-box contrast. Deployed: HF Space backend serving a self-contained model artifact."
    tags: [pytorch, computer-vision, attention, hugging-face]
  - id: proj.givemore
    name: Givemore – MovieLens recommender
    links:
      - {id: proj.givemore.demo, label: Live demo, url: "https://givemore-one.vercel.app/"}
      - {id: proj.givemore.github, label: GitHub, url: "https://github.com/Bukunmi2108/givemore"}
    text: Item-item collaborative filtering (adjusted cosine, IUF-weighted) blended with TF-IDF content similarity and a Bayesian popularity fallback - precomputed offline into a 9 MB SQLite artifact served by a zero-ML-dependency FastAPI; framework-free TypeScript frontend.
    tags: [recommender-systems, fastapi, sqlite, typescript]
  - id: proj.citation
    name: Legal Citation Hallucination Benchmark
    links:
      - {id: proj.citation.github, label: GitHub, url: "https://github.com/Bukunmi2108/legal_hallucination_dataset_evaluation"}
    text: Async LLM evaluation pipeline measuring citation hallucination across 6 frontier models × 328 prompts (English + Arabic). Pluggable providers, Pydantic schemas, citation-fabrication rubric, resume capability. Modeled on Stanford RegLab's legal_hallucinations.
    tags: [llm-evaluation, citations, multilingual, async-python]
