name: workspace-platform

services:
  postgres:
    image: postgres:17-alpine
    container_name: workspace-postgres
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.5
    security_opt:
      - no-new-privileges:true

networks:
  data:
    name: workspace_data
    external: true

volumes:
  postgres_data:
    name: workspace_postgres_data
