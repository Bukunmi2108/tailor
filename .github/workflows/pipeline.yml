name: Pipeline

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tailor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest tests -q
      - run: docker build -t tailor-backend-ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure deployment SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.CONTABO_VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.CONTABO_VPS_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/tailor_deploy
          chmod 600 ~/.ssh/tailor_deploy
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy verified revision
        env:
          VPS_HOST: ${{ vars.CONTABO_VPS_HOST }}
          VPS_USER: ${{ vars.CONTABO_VPS_USER }}
        run: ssh -i ~/.ssh/tailor_deploy "$VPS_USER@$VPS_HOST" /opt/workspace/apps/tailor/deploy "$GITHUB_SHA"
